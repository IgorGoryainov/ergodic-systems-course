name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Validate notebook format
        run: python -c "import nbformat; nbformat.read('notebooks/task2_ecg_analysis.ipynb', as_version=4); print('Notebook OK')"

      - name: Run tests
        run: pytest tests/ -v
